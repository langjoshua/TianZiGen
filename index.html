<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <title>TianZiGen</title>
      <link rel="stylesheet" href="style.css">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
   </head>
   <body>
      <!-- Navbar -->
      <header class="navbar">
         <div class="logo">TianZiGen</div>
         <div class="nav-right">
            <a href="/zh/" class="navitem">中文</a>
            <a href="https://github.com" class="navitem">GitHub</a>
         </div>
      </header>
      <!-- Layout -->
      <div class="app">
         <!-- LEFT -->
         <main class="container">
            <h1>TianZiGen</h1>
            <p>Generate printable tiánzìgē (田字格) worksheets with stroke order.</p>
            <textarea placeholder="Enter characters (e.g. 你好 学习)"></textarea>
            <!-- Grid options -->
            <div class="options">
               <label>
                  <input type="radio" name="grid" value="tian" checked>
                  <div class="card">
                     <svg viewBox="0 0 24 24">
                        <rect x="3" y="3" width="18" height="18"/>
                        <line x1="12" y1="3" x2="12" y2="21"/>
                        <line x1="3" y1="12" x2="21" y2="12"/>
                     </svg>
                     <span>Grid</span>
                  </div>
               </label>
               <label>
                  <input type="radio" name="grid" value="mi">
                  <div class="card">
                     <svg viewBox="0 0 24 24">
                        <rect x="3" y="3" width="18" height="18"/>
                        <line x1="3" y1="3" x2="21" y2="21"/>
                        <line x1="21" y1="3" x2="3" y2="21"/>
                        <line x1="12" y1="3" x2="12" y2="21"/>
                        <line x1="3" y1="12" x2="21" y2="12"/>
                     </svg>
                     <span>Diagonal</span>
                  </div>
               </label>
               <label>
                  <input type="radio" name="grid" value="kou">
                  <div class="card">
                     <svg viewBox="0 0 24 24">
                        <rect x="3" y="3" width="18" height="18"/>
                     </svg>
                     <span>Square</span>
                  </div>
               </label>
            </div>
            <!-- Controls -->
            <div class="controls">
               <label class="checkbox">
               <input type="checkbox" id="pinyin">
               <span class="box"></span>
               <span>Show Pinyin</span>
               </label>
               <select id="mode" class="select" name="grid">
                  <option value="initial">Only Initial</option>
                  <option value="progressive">Progressive Trace</option>
                  <option value="trace">Trace All</option>
               </select>
            </div>
            <div class="actions">
               <button id="print-btn" class="print-btn">
               <i class="fa-solid fa-print"></i> Print Worksheet
               </button>
               <button id="share-btn" class="share-btn">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                     <path d="M12 3v12"></path>
                     <path d="M8 7l4-4 4 4"></path>
                     <path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"></path>
                  </svg>
               </button>
            </div>
            <p id="message" class="hint"></p>
         </main>
         <!-- RIGHT -->
         <div class="preview">
            <iframe id="pdf-preview"></iframe>
         </div>
      </div>
      <!-- LOAD MODULE JS -->
      <script type="module" src="script.js"></script>
   </body>
</html>
